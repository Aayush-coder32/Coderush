services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    # PRODUCTION NOTE: Use managed database (MongoDB Atlas) instead of self-hosted

  api:
    build: ./backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      NODE_ENV: production  # ⚠️ Change to 'production' for deployed builds
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/smart_campus_os}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_use_long_random_32_char_string}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      # Add optional services
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENABLE_ATTENDANCE_ALERTS: ${ENABLE_ATTENDANCE_ALERTS:-true}
      SMTP_HOST: ${SMTP_HOST:-smtp.ethereal.email}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      - mongo

  web:
    build:
      context: ./frontend
      args:
        # Browser hits the SPA on :8080; Socket.io is proxied by nginx to the API.
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  mongo_data:
