name: Build & Deploy to Production

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend
      
      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend
      
      - name: Lint frontend
        run: npm run lint
        working-directory: ./frontend
        continue-on-error: true
      
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/smart-campus-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/smart-campus-api:${{ github.sha }}
      
      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          build-args: |
            VITE_SOCKET_URL=${{ secrets.PRODUCTION_API_URL }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/smart-campus-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/smart-campus-web:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to production server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            
            # Pull latest code
            git pull origin main
            
            # Stop existing containers
            docker-compose -f docker-compose.prod.yml down
            
            # Pull latest images
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/smart-campus-api:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/smart-campus-web:latest
            
            # Start new containers
            docker-compose -f docker-compose.prod.yml up -d
            
            # Wait for services to be healthy
            sleep 10
            
            # Verify deployment
            if curl -f http://localhost:5000/api/health > /dev/null; then
              echo "✅ Deployment successful"
            else
              echo "❌ Deployment failed - health check failed"
              exit 1
            fi
      
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Successful* 🚀\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref }}"
                  }
                }
              ]
            }
      
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Failed* ❌\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref }}"
                  }
                }
              ]
            }
